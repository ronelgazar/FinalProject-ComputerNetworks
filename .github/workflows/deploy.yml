name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Clone or pull latest code
            if [ -d ~/exam-network ]; then
              cd ~/exam-network
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git ~/exam-network
              cd ~/exam-network
            fi

            # Build and deploy
            docker compose down --remove-orphans || true
            docker compose up --build -d --scale client=3

            # Start prof_dashboard in background
            pkill -f prof_dashboard.py || true
            cd ~/exam-network
            pip3 install -q flask requests 2>/dev/null || true
            nohup python3 prof_dashboard.py > /tmp/prof_dashboard.log 2>&1 &

            echo "Deployment complete!"
            docker compose ps
